<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Primary -->
    <title>
      InstaWear — Vêtements événementiels Print-on-Demand | Sport, Festivals,
      Saisons
    </title>
    <meta
      name="description"
      content="InstaWear, la boutique de vêtements print-on-demand pour célébrer les grands événements mondiaux : Champions League, Carnaval de Rio, Oktoberfest, Halloween. Coton bio, impression IA, livraison en 4 jours."
    />
    <meta
      name="keywords"
      content="vêtements événementiels, print on demand, t-shirt festival, hoodie sport, UCL Champions League, Carnaval Rio, Halloween, Oktoberfest"
    />
    <link rel="canonical" href="https://instawear.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="InstaWear" />
    <meta
      property="og:title"
      content="InstaWear — Portez l'énergie de l'événement"
    />
    <meta
      property="og:description"
      content="Boutique de vêtements print-on-demand pour tous les grands événements mondiaux. Designs IA exclusifs, coton bio, livraison express."
    />
    <meta property="og:image" content="/InstaWear-logo.png" />
    <meta property="og:url" content="https://instawear.vercel.app/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="InstaWear — Portez l'énergie de l'événement"
    />
    <meta
      name="twitter:description"
      content="Print-on-demand événementiel. UCL, Carnaval Rio, Oktoberfest, Halloween. Livraison express, zéro stock gaspillé."
    />
    <meta name="twitter:image" content="/InstaWear-logo.png" />

    <!-- Schema.org Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "InstaWear",
        "url": "https://instawear.vercel.app/",
        "logo": "/InstaWear-logo.png",
        "description": "Boutique de vêtements print-on-demand pour les événements mondiaux",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "availableLanguage": ["French", "English"]
        }
      }
    </script>

    <!-- Favicon / Apple Touch Icon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/InstaWear-logo-wh-middle-no-BG.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/InstaWear-logo-wh-middle-no-BG.png"
    />
    <link rel="apple-touch-icon" href="/InstaWear-logo-wh-middle-no-BG.png" />
    <meta
      name="msapplication-TileImage"
      content="/InstaWear-logo-wh-middle-no-BG.png"
    />

    <!-- Google Fonts: Plus Jakarta Sans + DM Serif Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
