<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Primary -->
    <title>InstaWear — Wear the Moment</title>
    <meta
      name="description"
      content="InstaWear, the print-on-demand clothing store celebrating the world's biggest events: Champions League, Rio Carnival, Oktoberfest, Halloween. Organic cotton, AI-powered designs, 4-day delivery."
    />
    <meta
      name="keywords"
      content="event clothing, print on demand, festival t-shirt, sports hoodie, UCL Champions League, Rio Carnival, Halloween, Oktoberfest"
    />
    <link rel="canonical" href="https://instawear.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="InstaWear" />
    <meta
      property="og:title"
      content="InstaWear — Wear the Energy of the Moment"
    />
    <meta
      property="og:description"
      content="Print-on-demand clothing for every major global event. Exclusive AI designs, organic cotton, express delivery."
    />
    <meta property="og:image" content="/InstaWear-logo.png" />
    <meta property="og:url" content="https://instawear.vercel.app/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="InstaWear — Wear the Energy of the Moment"
    />
    <meta
      name="twitter:description"
      content="Event-driven print-on-demand. UCL, Rio Carnival, Oktoberfest, Halloween. Express delivery, zero wasted inventory."
    />
    <meta name="twitter:image" content="/InstaWear-logo.png" />

    <!-- Schema.org Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "InstaWear",
        "url": "https://instawear.vercel.app/",
        "logo": "/InstaWear-logo.png",
        "description": "Print-on-demand clothing store for global events",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "availableLanguage": ["English", "French"]
        }
      }
    </script>

    <!-- Favicon / Apple Touch Icon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/InstaWear-logo-wh-middle-no-BG.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/InstaWear-logo-wh-middle-no-BG.png"
    />
    <link rel="apple-touch-icon" href="/InstaWear-logo-wh-middle-no-BG.png" />
    <meta
      name="msapplication-TileImage"
      content="/InstaWear-logo-wh-middle-no-BG.png"
    />

    <!-- Google Fonts: Plus Jakarta Sans + DM Serif Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
